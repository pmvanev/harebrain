<svg width="148" height="46" viewBox="0 0 148 46" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink       { color: #17160d; }
    .mark      { color: #c8e024; }
    .mark-deep { color: #6e7e0a; }
    .rose      { color: #a14b3a; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ece4ce; }
      .mark      { color: #c8e024; }
      .mark-deep { color: #d9ed52; }
      .rose      { color: #d18374; }
    }
  </style>
  <g class="mark" stroke="none" fill="currentColor">
    <rect x="1" y="14" width="46" height="18" rx="1"/>
  </g>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <text x="6" y="27" font-family="ui-monospace, monospace" font-size="9" font-weight="700" letter-spacing="0.6" stroke="none">EXPECT</text>
  </g>
  <g class="mark-deep" stroke="currentColor" fill="currentColor">
    <line x1="52" y1="23" x2="83" y2="23" stroke-width="1.3"/>
    <polygon points="86,23 80,20 80,26" stroke="none"/>
    <text x="55" y="19" font-family="ui-monospace, monospace" font-size="6" letter-spacing="0.5" stroke="none">prove</text>
  </g>
  <g class="ink" stroke="currentColor" fill="none">
    <rect x="89" y="9" width="58" height="28" rx="2" stroke-width="1.2"/>
  </g>
  <g class="rose" stroke="currentColor" fill="currentColor">
    <polyline points="96,23 102,29 113,17" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="117" y="27" font-family="serif" font-size="8" font-style="italic" stroke="none">evidence</text>
  </g>
</svg>
