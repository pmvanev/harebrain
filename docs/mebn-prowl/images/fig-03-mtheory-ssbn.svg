<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MTheory plus query produces an SSBN: three MFrag templates on the left are instantiated for specific entities on the right.">
  <style>
    .ink           { color: #1a1810; }
    .muted         { color: #5d553f; }
    .sage          { color: #4f6b3f; }
    .blueprint     { color: #1f4f7a; }
    .blueprint-tint{ color: rgba(31, 79, 122, 0.07); }
    .oxblood       { color: #8b1f2c; }
    .oxblood-tint  { color: rgba(139, 31, 44, 0.06); }
    .sage-tint     { color: rgba(79, 107, 63, 0.08); }
    .rule          { color: #a99a76; }
    .paper-edge-2  { color: #e4dbc1; }
    @media (prefers-color-scheme: dark) {
      .ink           { color: #ede2c4; }
      .muted         { color: #a89c7d; }
      .sage          { color: #b1c98c; }
      .blueprint     { color: #88c0e8; }
      .blueprint-tint{ color: rgba(136, 192, 232, 0.10); }
      .oxblood       { color: #e09098; }
      .oxblood-tint  { color: rgba(224, 144, 152, 0.10); }
      .sage-tint     { color: rgba(177, 201, 140, 0.10); }
      .rule          { color: #5a5037; }
      .paper-edge-2  { color: #221f15; }
    }
  </style>
  <defs>
    <marker id="m-arr-ink-03" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" class="ink" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <!-- left: three MFrag templates header -->
  <g class="muted" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em">
    <text x="20" y="20">MTHEORY (templates)</text>
  </g>
  <g class="ink" stroke="currentColor" fill="none" stroke-width="1.3">
    <rect x="20" y="32" width="160" height="58" rx="6"/>
    <rect x="20" y="106" width="160" height="58" rx="6"/>
    <rect x="20" y="180" width="160" height="74" rx="6"/>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="Spectral, serif" font-size="11" font-style="italic">
    <text x="32" y="50">TypeMFrag</text>
    <text x="32" y="124">WeatherMFrag</text>
    <text x="32" y="198">IntentMFrag</text>
  </g>
  <g class="blueprint" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9">
    <text x="32" y="68">Res: Type(s)</text>
    <text x="32" y="142">Res: Weather(z)</text>
    <text x="32" y="216">Res: Intent(s, z)</text>
    <text x="32" y="230">Inp: Type, Weather</text>
  </g>
  <g class="sage" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9">
    <text x="32" y="82">Ctx: IsA(s, Ship)</text>
    <text x="32" y="156">Ctx: IsA(z, Zone)</text>
    <text x="32" y="244">Ctx: Within(s, z)</text>
  </g>

  <!-- middle: query box fill -->
  <g class="oxblood-tint" fill="currentColor" stroke="none">
    <rect x="200" y="50" width="170" height="84" rx="6"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="none" stroke-width="1.4">
    <rect x="200" y="50" width="170" height="84" rx="6"/>
  </g>
  <g class="oxblood" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.12em">
    <text x="285" y="68">QUERY</text>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9.5">
    <text x="210" y="86">target:</text>
    <text x="210" y="100">  Intent(s_3, z_5)</text>
    <text x="210" y="118">evidence:</text>
    <text x="210" y="132">  Type(s_3)=Tanker</text>
  </g>

  <!-- entities box fill -->
  <g class="paper-edge-2" fill="currentColor" stroke="none">
    <rect x="200" y="148" width="170" height="86" rx="6"/>
  </g>
  <g class="rule" stroke="currentColor" fill="none" stroke-width="1.2">
    <rect x="200" y="148" width="170" height="86" rx="6"/>
  </g>
  <g class="muted" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.12em">
    <text x="285" y="166">ENTITIES</text>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9.5">
    <text x="210" y="184">s_3 &#8712; Ship</text>
    <text x="210" y="198">s_4 &#8712; Ship</text>
    <text x="210" y="212">z_5 &#8712; Zone</text>
    <text x="210" y="226">Within(s_3,z_5),</text>
    <text x="210" y="240">Within(s_4,z_5)</text>
  </g>

  <!-- arrow construct -->
  <g class="oxblood" stroke="currentColor" fill="none" stroke-width="1.6">
    <line x1="375" y1="180" x2="408" y2="180"/>
  </g>
  <g class="oxblood" fill="currentColor" stroke="none">
    <polygon points="412,180 405,176 405,184"/>
  </g>
  <g class="oxblood" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle">
    <text x="392" y="172">construct</text>
  </g>

  <!-- right: SSBN header -->
  <g class="muted" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em">
    <text x="420" y="20">SSBN (instantiated)</text>
  </g>
  <!-- input-style nodes (Type, Weather) fills -->
  <g class="blueprint-tint" fill="currentColor" stroke="none">
    <ellipse cx="450" cy="60" rx="40" ry="18"/>
    <ellipse cx="560" cy="60" rx="40" ry="18"/>
    <ellipse cx="505" cy="290" rx="50" ry="18"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="none" stroke-width="1.3">
    <ellipse cx="450" cy="60" rx="40" ry="18"/>
    <ellipse cx="560" cy="60" rx="40" ry="18"/>
    <ellipse cx="505" cy="290" rx="50" ry="18"/>
  </g>
  <!-- intent nodes fills -->
  <g class="oxblood-tint" fill="currentColor" stroke="none">
    <ellipse cx="450" cy="180" rx="50" ry="20"/>
    <ellipse cx="560" cy="180" rx="50" ry="20"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="none" stroke-width="1.6">
    <ellipse cx="450" cy="180" rx="50" ry="20"/>
    <ellipse cx="560" cy="180" rx="50" ry="20"/>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="Spectral, serif" font-size="11" font-style="italic" text-anchor="middle">
    <text x="450" y="64">Type(s_3)</text>
    <text x="560" y="64">Type(s_4)</text>
    <text x="450" y="184">Intent(s_3,z_5)</text>
    <text x="560" y="184">Intent(s_4,z_5)</text>
    <text x="505" y="294">Weather(z_5)</text>
  </g>
  <g class="ink" stroke="currentColor" fill="none" stroke-width="1.2">
    <line x1="450" y1="78" x2="450" y2="160" marker-end="url(#m-arr-ink-03)"/>
    <line x1="560" y1="78" x2="560" y2="160" marker-end="url(#m-arr-ink-03)"/>
    <line x1="490" y1="278" x2="465" y2="200" marker-end="url(#m-arr-ink-03)"/>
    <line x1="520" y1="278" x2="545" y2="200" marker-end="url(#m-arr-ink-03)"/>
  </g>

  <!-- evidence indicator on Type(s_3) fill -->
  <g class="sage-tint" fill="currentColor" stroke="none">
    <rect x="420" y="86" width="60" height="14" rx="3"/>
  </g>
  <g class="sage" stroke="currentColor" fill="none" stroke-width="1">
    <rect x="420" y="86" width="60" height="14" rx="3"/>
  </g>
  <g class="sage" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle">
    <text x="450" y="96">obs: Tanker</text>
  </g>

  <g class="muted" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.1em">
    <text x="505" y="340">two ships in z_5 &#8594; IntentMFrag instantiated twice; one shared Weather node</text>
  </g>
</svg>
