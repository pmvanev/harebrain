<svg viewBox="0 0 540 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Anatomy of an MFrag with context, input, and resident random variables, plus a local distribution panel.">
  <style>
    .ink           { color: #1a1810; }
    .muted         { color: #5d553f; }
    .sage          { color: #4f6b3f; }
    .sage-tint     { color: rgba(79, 107, 63, 0.08); }
    .blueprint     { color: #1f4f7a; }
    .blueprint-tint{ color: rgba(31, 79, 122, 0.07); }
    .oxblood       { color: #8b1f2c; }
    .oxblood-tint  { color: rgba(139, 31, 44, 0.06); }
    .paper-edge-2  { color: #e4dbc1; }
    .rule-soft     { color: #d4c8a4; }
    @media (prefers-color-scheme: dark) {
      .ink           { color: #ede2c4; }
      .muted         { color: #a89c7d; }
      .sage          { color: #b1c98c; }
      .sage-tint     { color: rgba(177, 201, 140, 0.10); }
      .blueprint     { color: #88c0e8; }
      .blueprint-tint{ color: rgba(136, 192, 232, 0.10); }
      .oxblood       { color: #e09098; }
      .oxblood-tint  { color: rgba(224, 144, 152, 0.10); }
      .paper-edge-2  { color: #221f15; }
      .rule-soft     { color: #3a3327; }
    }
  </style>
  <defs>
    <marker id="m-arr-ink-02" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" class="ink" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <!-- outer MFrag boundary -->
  <g class="ink" stroke="currentColor" fill="none" stroke-width="1.6">
    <rect x="20" y="20" width="380" height="280" rx="12"/>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="Fraunces, serif" font-size="13" font-style="italic">
    <text x="36" y="40">IntentMFrag</text>
  </g>
  <g class="muted" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em">
    <text x="36" y="55">parameters: s, z</text>
  </g>

  <!-- Context band fill -->
  <g class="sage-tint" fill="currentColor" stroke="none">
    <rect x="36" y="68" width="348" height="42" rx="6"/>
  </g>
  <!-- Context band stroke -->
  <g class="sage" stroke="currentColor" fill="none" stroke-width="1.3">
    <rect x="36" y="68" width="348" height="42" rx="6"/>
  </g>
  <g class="sage" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em">
    <text x="46" y="84">CONTEXT</text>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="Spectral, serif" font-size="12" font-style="italic">
    <text x="46" y="102">IsA(s, Ship)  &#8743;  IsA(z, Zone)  &#8743;  Within(s, z)</text>
  </g>

  <!-- Input label -->
  <g class="blueprint" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em">
    <text x="46" y="136">INPUT</text>
  </g>
  <!-- Input node fills -->
  <g class="blueprint-tint" fill="currentColor" stroke="none">
    <ellipse cx="120" cy="170" rx="50" ry="20"/>
    <ellipse cx="260" cy="170" rx="60" ry="20"/>
  </g>
  <!-- Input node strokes -->
  <g class="blueprint" stroke="currentColor" fill="none" stroke-width="1.4">
    <ellipse cx="120" cy="170" rx="50" ry="20"/>
    <ellipse cx="260" cy="170" rx="60" ry="20"/>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="Spectral, serif" font-size="12" font-style="italic" text-anchor="middle">
    <text x="120" y="174">Type(s)</text>
    <text x="260" y="174">Weather(z)</text>
  </g>

  <!-- arrows down to resident -->
  <g class="ink" stroke="currentColor" fill="none" stroke-width="1.3">
    <line x1="120" y1="190" x2="180" y2="240" marker-end="url(#m-arr-ink-02)"/>
    <line x1="260" y1="190" x2="220" y2="240" marker-end="url(#m-arr-ink-02)"/>
  </g>

  <!-- Resident label -->
  <g class="oxblood" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em">
    <text x="46" y="226">RESIDENT</text>
  </g>
  <!-- Resident fill -->
  <g class="oxblood-tint" fill="currentColor" stroke="none">
    <ellipse cx="200" cy="263" rx="70" ry="22"/>
  </g>
  <!-- Resident stroke -->
  <g class="oxblood" stroke="currentColor" fill="none" stroke-width="1.6">
    <ellipse cx="200" cy="263" rx="70" ry="22"/>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="Spectral, serif" font-size="13" font-style="italic" text-anchor="middle">
    <text x="200" y="267">Intent(s, z)</text>
  </g>

  <!-- Local distribution panel fill -->
  <g class="paper-edge-2" fill="currentColor" stroke="none">
    <rect x="416" y="68" width="116" height="220" rx="6"/>
  </g>
  <!-- Local distribution panel stroke -->
  <g class="ink" stroke="currentColor" fill="none" stroke-width="1.3">
    <rect x="416" y="68" width="116" height="220" rx="6"/>
  </g>
  <g class="muted" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.12em">
    <text x="474" y="86">LOCAL DIST</text>
  </g>
  <g class="rule-soft" stroke="currentColor" fill="none">
    <line x1="426" y1="94" x2="522" y2="94"/>
  </g>
  <g class="ink" fill="currentColor" stroke="none" font-family="ui-monospace, monospace" font-size="8.5">
    <text x="426" y="112">if Type=Tanker</text>
    <text x="426" y="124">  Intent ~</text>
    <text x="426" y="136">  [trade .80,</text>
    <text x="426" y="148">   smuggle .15,</text>
    <text x="426" y="160">   pirate .05]</text>
    <text x="426" y="180">if Type=Fishing</text>
    <text x="426" y="192">  Intent ~</text>
    <text x="426" y="204">  [fish .85,</text>
    <text x="426" y="216">   trade .12,</text>
    <text x="426" y="228">   pirate .03]</text>
    <text x="426" y="252">P shifts when</text>
    <text x="426" y="264">Weather = Storm</text>
  </g>
</svg>
