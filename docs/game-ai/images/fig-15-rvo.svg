<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two agents on converging paths each adjust velocity, picking new directions that avoid the velocity-obstacle cone.">
  <style>
    .ink       { color: #1a1810; }
    .muted     { color: #5d553f; }
    .rule-soft { color: #d4c8a4; }
    .paper     { color: #f3eddc; }
    .blueprint { color: #1f4f7a; }
    .oxblood   { color: #8b1f2c; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .muted     { color: #a89c7d; }
      .rule-soft { color: #3a3327; }
      .paper     { color: #14130c; }
      .blueprint { color: #88c0e8; }
      .oxblood   { color: #e09098; }
    }
  </style>
  <defs>
    <marker id="arr-blue" class="blueprint" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
    <marker id="arr-ox" class="oxblood" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <g class="rule-soft" stroke="currentColor" fill="currentColor">
    <polygon points="80,100 380,75 380,125" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <text x="230" y="155" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" stroke="none">velocity-obstacle cone (collision velocities)</text>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <circle cx="80" cy="100" r="12" stroke="none"/>
    <g stroke-width="1.5" fill="none" stroke-dasharray="4 3">
      <line x1="92" y1="100" x2="200" y2="100" marker-end="url(#arr-blue)"/>
    </g>
    <text x="150" y="92" font-family="ui-monospace, monospace" font-size="9" stroke="none">desired v</text>
    <path d="M 80 100 Q 130 65 210 60" stroke-width="2.2" fill="none" marker-end="url(#arr-blue)"/>
    <text x="150" y="50" font-family="ui-monospace, monospace" font-size="9" stroke="none">new v (skirts cone)</text>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <circle cx="380" cy="100" r="12" stroke="none"/>
    <g stroke-width="1.5" fill="none" stroke-dasharray="4 3">
      <line x1="368" y1="100" x2="260" y2="100" marker-end="url(#arr-ox)"/>
    </g>
    <text x="310" y="92" font-family="ui-monospace, monospace" font-size="9" stroke="none">desired v</text>
    <path d="M 380 100 Q 330 135 250 140" stroke-width="2.2" fill="none" marker-end="url(#arr-ox)"/>
    <text x="245" y="170" font-family="ui-monospace, monospace" font-size="9" stroke="none">mirror choice on B&#8217;s side</text>
  </g>
  <g class="paper" fill="currentColor">
    <g font-family="ui-monospace, monospace" font-size="10" text-anchor="middle" stroke="none">
      <text x="80" y="104">A</text>
      <text x="380" y="104">B</text>
    </g>
  </g>
</svg>
