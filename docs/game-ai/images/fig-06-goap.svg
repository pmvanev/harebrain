<svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GOAP planner finds a sequence of actions whose preconditions and effects chain into the goal state.">
  <style>
    .ink       { color: #1a1810; }
    .muted     { color: #5d553f; }
    .rule      { color: #a99a76; }
    .rule-soft { color: #d4c8a4; }
    .sage      { color: #4f6b3f; }
    .tint-paper { fill: #e4dbc1; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .muted     { color: #a89c7d; }
      .rule      { color: #5a5037; }
      .rule-soft { color: #3a3327; }
      .sage      { color: #b1c98c; }
      .tint-paper { fill: #221f15; }
    }
  </style>
  <defs>
    <marker id="arr-muted" class="muted" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="currentColor" stroke="none"/>
    </marker>
    <marker id="arr-sage" class="sage" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <g class="rule-soft tint-paper" stroke="currentColor">
    <g stroke-width="1.1">
      <rect x="10" y="60" width="100" height="48" rx="6"/>
      <rect x="200" y="20" width="100" height="48" rx="6"/>
      <rect x="200" y="100" width="100" height="48" rx="6"/>
      <rect x="380" y="60" width="100" height="48" rx="6"/>
    </g>
  </g>
  <g class="sage" stroke="currentColor" fill="currentColor">
    <g stroke-width="1.6" fill-opacity="0.08">
      <rect x="10" y="60" width="100" height="48" rx="6"/>
      <rect x="200" y="100" width="100" height="48" rx="6"/>
      <rect x="380" y="60" width="100" height="48" rx="6"/>
    </g>
    <g stroke-width="2" fill="none">
      <line x1="110" y1="84" x2="200" y2="124" marker-end="url(#arr-sage)"/>
      <line x1="300" y1="124" x2="250" y2="68" marker-end="url(#arr-sage)"/>
      <line x1="300" y1="44" x2="380" y2="80" marker-end="url(#arr-sage)"/>
    </g>
    <text x="260" y="195" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle" stroke="none">plan = [ Reload &#8594; Attack ] &#160;&#183;&#160; chosen by A*</text>
  </g>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <g font-family="Spectral, serif" font-size="12" text-anchor="middle" stroke="none">
      <text x="60" y="80" font-weight="600">START</text>
      <text x="250" y="42" font-weight="600">Attack</text>
      <text x="250" y="122" font-weight="600">Reload</text>
      <text x="430" y="80" font-weight="600">GOAL</text>
    </g>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <g font-family="Spectral, serif" font-size="10" text-anchor="middle" font-style="italic" stroke="none">
      <text x="60" y="100">no ammo</text>
      <text x="250" y="60">needs ammo</text>
      <text x="250" y="140">needs clip</text>
      <text x="430" y="100">enemy dead</text>
    </g>
    <text x="260" y="175" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" stroke="none">action space (gray = explored, sage = chosen path)</text>
  </g>
  <g class="rule" stroke="currentColor" fill="none">
    <line x1="110" y1="84" x2="200" y2="44" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arr-muted)"/>
  </g>
</svg>
