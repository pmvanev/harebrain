<svg viewBox="0 0 520 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A behavior tree with a root Selector, child Sequence, and leaf task nodes.">
  <style>
    .ink       { color: #1a1810; }
    .muted     { color: #5d553f; }
    .blueprint { color: #1f4f7a; }
    .sage      { color: #4f6b3f; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .muted     { color: #a89c7d; }
      .blueprint { color: #88c0e8; }
      .sage      { color: #b1c98c; }
    }
  </style>
  <defs>
    <marker id="arr-ink" class="ink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="230" y="15" width="60" height="34" rx="4" stroke-width="1.4" fill="none"/>
    <g stroke-width="1.2" fill="none">
      <line x1="240" y1="49" x2="100" y2="85" marker-end="url(#arr-ink)"/>
      <line x1="260" y1="49" x2="260" y2="85" marker-end="url(#arr-ink)"/>
      <line x1="280" y1="49" x2="420" y2="85" marker-end="url(#arr-ink)"/>
    </g>
    <rect x="70" y="90" width="60" height="34" rx="4" stroke-width="1.4" fill="none"/>
    <rect x="230" y="90" width="60" height="34" rx="17" stroke-dasharray="3 2" stroke-width="1.4" fill="none"/>
    <text x="260" y="111" font-family="Spectral, serif" font-size="11" text-anchor="middle" stroke="none">Wander</text>
    <rect x="390" y="90" width="60" height="34" rx="17" stroke-dasharray="3 2" stroke-width="1.4" fill="none"/>
    <text x="420" y="111" font-family="Spectral, serif" font-size="11" text-anchor="middle" stroke="none">Idle</text>
    <g stroke-width="1.2" fill="none">
      <line x1="80" y1="124" x2="35" y2="170" marker-end="url(#arr-ink)"/>
      <line x1="100" y1="124" x2="100" y2="170" marker-end="url(#arr-ink)"/>
      <line x1="120" y1="124" x2="165" y2="170" marker-end="url(#arr-ink)"/>
    </g>
    <g stroke-width="1.4" fill="none">
      <rect x="5" y="175" width="60" height="34" rx="17"/>
      <rect x="70" y="175" width="60" height="34" rx="17"/>
      <rect x="135" y="175" width="60" height="34" rx="17"/>
    </g>
    <g font-family="Spectral, serif" font-size="11" text-anchor="middle" stroke="none">
      <text x="35" y="196">SeeFoe?</text>
      <text x="100" y="196">MoveTo</text>
      <text x="165" y="196">Attack</text>
    </g>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <text x="260" y="38" font-family="ui-monospace, monospace" font-size="18" text-anchor="middle" stroke="none">?</text>
  </g>
  <g class="sage" stroke="currentColor" fill="currentColor">
    <text x="100" y="113" font-family="ui-monospace, monospace" font-size="18" text-anchor="middle" stroke="none">&#8594;</text>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <g font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" stroke="none">
      <text x="260" y="9">SELECTOR</text>
      <text x="100" y="84">SEQUENCE</text>
      <text x="260" y="84">TASK</text>
    </g>
    <g font-family="ui-monospace, monospace" font-size="8" text-anchor="middle" stroke="none">
      <text x="35" y="222">CONDITION</text>
      <text x="100" y="222">TASK</text>
      <text x="165" y="222">TASK</text>
    </g>
    <g font-family="ui-monospace, monospace" font-size="9" stroke="none">
      <text x="475" y="42">tries L&#8594;R</text>
      <text x="475" y="55">first SUCCESS</text>
      <text x="475" y="68">wins</text>
    </g>
  </g>
</svg>
