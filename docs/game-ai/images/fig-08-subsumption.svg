<svg viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Subsumption: stacked behavior layers, higher layers can suppress lower ones on the way to the motors.">
  <style>
    .ink     { color: #1a1810; }
    .muted   { color: #5d553f; }
    .oxblood { color: #8b1f2c; }
    .tint-paper { fill: #e4dbc1; }
    @media (prefers-color-scheme: dark) {
      .ink     { color: #ede2c4; }
      .muted   { color: #a89c7d; }
      .oxblood { color: #e09098; }
      .tint-paper { fill: #221f15; }
    }
  </style>
  <defs>
    <marker id="arr-ink" class="ink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <g stroke-width="1.4" fill="none">
      <rect x="20" y="28" width="70" height="160" rx="4"/>
      <rect x="410" y="28" width="70" height="160" rx="4"/>
      <rect x="120" y="30" width="270" height="32" rx="3" class="tint-paper"/>
      <rect x="120" y="78" width="270" height="32" rx="3" class="tint-paper"/>
      <rect x="120" y="126" width="270" height="32" rx="3" class="tint-paper"/>
    </g>
    <g font-family="Spectral, serif" font-size="13" stroke="none">
      <text x="135" y="51">Explore</text>
      <text x="135" y="99">Wander</text>
      <text x="135" y="147">Avoid obstacle</text>
    </g>
    <g stroke-width="1.2" fill="none">
      <line x1="90" y1="46" x2="120" y2="46" marker-end="url(#arr-ink)"/>
      <line x1="90" y1="94" x2="120" y2="94" marker-end="url(#arr-ink)"/>
      <line x1="90" y1="142" x2="120" y2="142" marker-end="url(#arr-ink)"/>
      <line x1="390" y1="46" x2="410" y2="46" marker-end="url(#arr-ink)"/>
      <line x1="390" y1="94" x2="410" y2="94" marker-end="url(#arr-ink)"/>
      <line x1="390" y1="142" x2="410" y2="142" marker-end="url(#arr-ink)"/>
    </g>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <g font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em" stroke="none">
      <text x="20" y="20">SENSORS</text>
      <text x="430" y="20">MOTORS</text>
    </g>
    <g font-family="ui-monospace, monospace" font-size="8" stroke="none">
      <text x="370" y="51" text-anchor="end">layer 3</text>
      <text x="370" y="99" text-anchor="end">layer 2</text>
      <text x="370" y="147" text-anchor="end">layer 1</text>
    </g>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <path d="M 390 142 Q 405 110 405 95 Q 405 60 393 47" stroke-width="1.4" fill="none"/>
    <circle cx="405" cy="95" r="3.5"/>
    <text x="405" y="80" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle" stroke="none">S</text>
    <text x="410" y="115" font-family="ui-monospace, monospace" font-size="9" stroke="none">suppress</text>
  </g>
</svg>
