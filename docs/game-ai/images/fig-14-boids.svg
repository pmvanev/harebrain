<svg viewBox="0 0 540 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three flocking rules: separation, alignment, cohesion, each shown with three boids and the resulting force on the middle one.">
  <style>
    .ink       { color: #1a1810; }
    .muted     { color: #5d553f; }
    .rule-soft { color: #d4c8a4; }
    .blueprint { color: #1f4f7a; }
    .oxblood   { color: #8b1f2c; }
    .sage      { color: #4f6b3f; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .muted     { color: #a89c7d; }
      .rule-soft { color: #3a3327; }
      .blueprint { color: #88c0e8; }
      .oxblood   { color: #e09098; }
      .sage      { color: #b1c98c; }
    }
  </style>
  <defs>
    <marker id="arr-ox" class="oxblood" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
    <marker id="arr-blue" class="blueprint" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
    <marker id="arr-sage" class="sage" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <g font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.16em" stroke="none">
      <text x="90" y="20" text-anchor="middle">SEPARATION</text>
      <text x="270" y="20" text-anchor="middle">ALIGNMENT</text>
      <text x="450" y="20" text-anchor="middle">COHESION</text>
    </g>
  </g>
  <g class="rule-soft" stroke="currentColor" fill="none">
    <g stroke-width="1" stroke-dasharray="3 3">
      <line x1="180" y1="40" x2="180" y2="180"/>
      <line x1="360" y1="40" x2="360" y2="180"/>
    </g>
  </g>
  <!-- separation -->
  <g transform="translate(90 110)">
    <g class="ink" fill="currentColor" stroke="none">
      <polygon points="-50,-25 -32,-20 -50,-15"/>
      <polygon points="50,15 32,20 50,25"/>
      <polygon points="-12,5 6,10 -12,15"/>
    </g>
    <g class="oxblood" stroke="currentColor" fill="none">
      <g stroke-width="1.8">
        <line x1="-3" y1="10" x2="-30" y2="-10" marker-end="url(#arr-ox)"/>
        <line x1="-3" y1="10" x2="25" y2="40" marker-end="url(#arr-ox)"/>
      </g>
      <text x="0" y="68" font-family="Spectral, serif" font-size="10" text-anchor="middle" font-style="italic" stroke="none" fill="currentColor">push away from neighbours</text>
    </g>
  </g>
  <!-- alignment -->
  <g transform="translate(270 110)">
    <g class="ink" fill="currentColor" stroke="none">
      <polygon points="-50,-25 -32,-20 -50,-15"/>
      <polygon points="50,5 32,10 50,15"/>
      <polygon points="-12,15 6,20 -12,25"/>
    </g>
    <g class="blueprint" stroke="currentColor" fill="none">
      <line x1="-3" y1="20" x2="25" y2="20" stroke-width="1.8" marker-end="url(#arr-blue)"/>
      <text x="0" y="68" font-family="Spectral, serif" font-size="10" text-anchor="middle" font-style="italic" stroke="none" fill="currentColor">steer toward mean heading</text>
    </g>
  </g>
  <!-- cohesion -->
  <g transform="translate(450 110)">
    <g class="ink" fill="currentColor" stroke="none">
      <polygon points="-40,-30 -22,-25 -40,-20"/>
      <polygon points="40,-25 22,-20 40,-15"/>
      <polygon points="-15,35 3,40 -15,45"/>
    </g>
    <g class="sage" stroke="currentColor" fill="currentColor">
      <line x1="-6" y1="40" x2="0" y2="-5" stroke-width="1.8" fill="none" marker-end="url(#arr-sage)"/>
      <circle cx="0" cy="-13" r="3" stroke="none"/>
      <text x="0" y="68" font-family="Spectral, serif" font-size="10" text-anchor="middle" font-style="italic" stroke="none">pull toward centroid</text>
    </g>
  </g>
</svg>
