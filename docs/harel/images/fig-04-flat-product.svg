<svg width="380" height="200" viewBox="0 0 380 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink     { color: #1a1810; }
    .oxblood { color: #8b1f2c; }
    @media (prefers-color-scheme: dark) {
      .ink     { color: #ede2c4; }
      .oxblood { color: #e09098; }
    }
  </style>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <!-- top row -->
    <rect x="20"  y="20"  width="64" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="158" y="20"  width="64" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="296" y="20"  width="64" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <!-- bottom row -->
    <rect x="20"  y="150" width="64" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="158" y="150" width="64" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="296" y="150" width="64" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <!-- labels -->
    <text x="52"  y="40"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">B,E</text>
    <text x="190" y="40"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">B,F</text>
    <text x="328" y="40"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">B,G</text>
    <text x="52"  y="170" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">C,E</text>
    <text x="190" y="170" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">C,F</text>
    <text x="328" y="170" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">C,G</text>
    <!-- horizontal arrows top row -->
    <line x1="84"  y1="34" x2="158" y2="34" stroke-width="1.2"/>
    <polygon points="158,34 152,31 152,37" stroke="none"/>
    <line x1="222" y1="34" x2="296" y2="34" stroke-width="1.2"/>
    <polygon points="296,34 290,31 290,37" stroke="none"/>
    <!-- horizontal arrows bottom row -->
    <line x1="84"  y1="164" x2="158" y2="164" stroke-width="1.2"/>
    <polygon points="158,164 152,161 152,167" stroke="none"/>
    <line x1="222" y1="164" x2="296" y2="164" stroke-width="1.2"/>
    <polygon points="296,164 290,161 290,167" stroke="none"/>
    <!-- vertical arrows -->
    <line x1="52"  y1="48" x2="52"  y2="150" stroke-width="1.2"/>
    <polygon points="52,150 49,144 55,144" stroke="none"/>
    <line x1="190" y1="48" x2="190" y2="150" stroke-width="1.2"/>
    <polygon points="190,150 187,144 193,144" stroke="none"/>
    <line x1="328" y1="48" x2="328" y2="150" stroke-width="1.2"/>
    <polygon points="328,150 325,144 331,144" stroke="none"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <text x="190" y="100" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em" text-anchor="middle" stroke="none">&#xD7; SIX PRODUCT STATES, ~TWELVE ARROWS &#x2014; GROWTH IS MULTIPLICATIVE</text>
  </g>
</svg>
