<svg viewBox="0 0 620 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two columns mapping LLM-Modulo constructs (left, oxblood) onto harebrain primitives (right, blueprint): candidate generator ↔ LLM at the leaf, plan blackboard ↔ blackboard/Manifest, hard critic ↔ transition guard, soft critic ↔ EDD adversarial review, meta controller ↔ AI director, model acquisition ↔ slow-clock chart authoring, reformatter ↔ the seam translation.">
  <style>
    .ink            { color: #1a1810; }
    .muted          { color: #5d553f; }
    .rule-soft      { color: #d4c8a4; }
    .oxblood        { color: #8b1f2c; }
    .blueprint      { color: #1f4f7a; }
    .blueprint-tint { color: rgba(31, 79, 122, 0.07); }
    .oxblood-tint   { color: rgba(139, 31, 44, 0.06); }
    @media (prefers-color-scheme: dark) {
      .ink            { color: #ede2c4; }
      .muted          { color: #a89c7d; }
      .rule-soft      { color: #3a3327; }
      .oxblood        { color: #e09098; }
      .blueprint      { color: #88c0e8; }
      .blueprint-tint { color: rgba(136, 192, 232, 0.10); }
      .oxblood-tint   { color: rgba(224, 144, 152, 0.10); }
    }
  </style>

  <!-- column headers -->
  <g class="oxblood" stroke="none" fill="currentColor">
    <text x="130" y="28" font-family="Fraunces, serif" font-size="14" font-style="italic" text-anchor="middle">LLM-Modulo</text>
  </g>
  <g class="blueprint" stroke="none" fill="currentColor">
    <text x="490" y="28" font-family="Fraunces, serif" font-size="14" font-style="italic" text-anchor="middle">harebrain</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="310" y="28" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">&#x2194;</text>
  </g>
  <g class="rule-soft" stroke="currentColor" fill="none">
    <line x1="40" y1="40" x2="580" y2="40" stroke-width="1"/>
  </g>

  <!-- row template -->
  <!-- Row 1: Candidate generator <-> LLM at the leaf -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="60" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="60" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="78" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">candidate generator</text>
    <text x="30" y="95" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">LLM guesses whole plans</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="60" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="60" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="78" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">LLM at the leaf</text>
    <text x="370" y="95" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">one call per state, scoped by where</text>
  </g>

  <!-- Row 2: Plan blackboard <-> Blackboard / Manifest -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="118" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="118" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="136" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">plan blackboard</text>
    <text x="30" y="153" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">candidate-plan working store</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="118" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="118" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="136" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">blackboard / Manifest</text>
    <text x="370" y="153" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">world state w/ decay &#183; tick-snapshot</text>
  </g>

  <!-- Row 3: Hard critic <-> Transition guard -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="176" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="176" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="194" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">hard critic (B&#x2081;)</text>
    <text x="30" y="211" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">sound: VAL, simulator, unit test</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="176" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="176" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="194" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">transition guard</text>
    <text x="370" y="211" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">when [open_qs == 0] =&gt; Report</text>
  </g>

  <!-- Row 4: Soft critic <-> EDD adversarial review -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="234" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="234" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="252" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">soft critic (S&#x1d62;)</text>
    <text x="30" y="269" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">LLM-based: style, preference</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="234" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="234" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="252" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">EDD adversarial review</text>
    <text x="370" y="269" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">expectation check on each transition</text>
  </g>

  <!-- Row 5: Meta controller <-> AI Director -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="292" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="292" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="310" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">meta controller</text>
    <text x="30" y="327" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">pools critique &#183; backprompt</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="292" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="292" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="310" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">AI director</text>
    <text x="370" y="327" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">outer loop modulating the inner</text>
  </g>

  <!-- Row 6: Model acquisition <-> Slow-clock chart authoring -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="350" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="350" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="368" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">model acquisition (HIL)</text>
    <text x="30" y="385" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">LLM drafts PDDL, expert signs off</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="350" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="350" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="368" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">slow-clock chart authoring</text>
    <text x="370" y="385" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">LLM drafts .mpl, human reviews</text>
  </g>

  <!-- Row 7: Reformatter <-> The seam translation -->
  <g class="oxblood-tint" stroke="none" fill="currentColor"><rect x="20" y="408" width="240" height="44" rx="6"/></g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="408" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="30" y="426" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">reformatter</text>
    <text x="30" y="443" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">candidate &#8594; each critic&#8217;s syntax</text>
  </g>
  <g class="blueprint-tint" stroke="none" fill="currentColor"><rect x="360" y="408" width="240" height="44" rx="6"/></g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="360" y="408" width="240" height="44" rx="6" stroke-width="1.3" fill="none"/>
    <text x="370" y="426" font-family="Fraunces, serif" font-size="11" font-style="italic" stroke="none">the seam</text>
    <text x="370" y="443" font-family="JetBrains Mono, monospace" font-size="8" stroke="none">host import &#8594; typed verdict</text>
  </g>

  <!-- connecting arrows -->
  <g class="muted" stroke="currentColor" fill="currentColor">
    <line x1="262" y1="82"  x2="358" y2="82"  stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,82 352,79 352,85" stroke="none"/>
    <line x1="262" y1="140" x2="358" y2="140" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,140 352,137 352,143" stroke="none"/>
    <line x1="262" y1="198" x2="358" y2="198" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,198 352,195 352,201" stroke="none"/>
    <line x1="262" y1="256" x2="358" y2="256" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,256 352,253 352,259" stroke="none"/>
    <line x1="262" y1="314" x2="358" y2="314" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,314 352,311 352,317" stroke="none"/>
    <line x1="262" y1="372" x2="358" y2="372" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,372 352,369 352,375" stroke="none"/>
    <line x1="262" y1="430" x2="358" y2="430" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="358,430 352,427 352,433" stroke="none"/>
  </g>

  <!-- footer caption -->
  <g class="rule-soft" stroke="currentColor" fill="none">
    <line x1="40" y1="468" x2="580" y2="468" stroke-width="1"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="310" y="486" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">paper grants the cage is necessary &#183; harebrain widens what counts as a critic</text>
  </g>
</svg>
