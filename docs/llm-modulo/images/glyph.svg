<svg width="190" height="58" viewBox="0 0 190 58" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink            { color: #1a1810; }
    .muted          { color: #5d553f; }
    .oxblood        { color: #8b1f2c; }
    .blueprint      { color: #1f4f7a; }
    .sage           { color: #4f6b3f; }
    .blueprint-tint { color: rgba(31, 79, 122, 0.08); }
    .oxblood-tint   { color: rgba(139, 31, 44, 0.06); }
    @media (prefers-color-scheme: dark) {
      .ink            { color: #ede2c4; }
      .muted          { color: #a89c7d; }
      .oxblood        { color: #e09098; }
      .blueprint      { color: #88c0e8; }
      .sage           { color: #b1c98c; }
      .blueprint-tint { color: rgba(136, 192, 232, 0.10); }
      .oxblood-tint   { color: rgba(224, 144, 152, 0.10); }
    }
  </style>
  <!-- LLM disc -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <ellipse cx="30" cy="29" rx="24" ry="13"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <ellipse cx="30" cy="29" rx="24" ry="13" stroke-width="1.4" fill="none"/>
    <text x="30" y="32" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle" letter-spacing="0.1em" stroke="none">LLM</text>
  </g>
  <!-- candidate arrow (top) -->
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <line x1="55" y1="19" x2="128" y2="19" stroke-width="1.3"/>
    <polygon points="131,19 125,16 125,22" stroke="none"/>
    <text x="66" y="14" font-family="ui-monospace, monospace" font-size="7" letter-spacing="0.4" stroke="none">candidate</text>
  </g>
  <!-- critic bank (box with labels) -->
  <g class="oxblood-tint" stroke="none" fill="currentColor">
    <rect x="135" y="9" width="48" height="40" rx="4"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="135" y="9" width="48" height="40" rx="4" stroke-width="1.4" fill="none"/>
    <text x="141" y="21" font-family="ui-monospace, monospace" font-size="8" stroke="none">B&#x2081;</text>
    <text x="141" y="33" font-family="ui-monospace, monospace" font-size="8" stroke="none">S&#x2081;</text>
    <text x="141" y="45" font-family="ui-monospace, monospace" font-size="8" stroke="none">R&#x2099;</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="159" y="5" font-family="ui-monospace, monospace" font-size="6" letter-spacing="0.1em">CRITICS</text>
  </g>
  <!-- backprompt arrow (bottom, dashed) -->
  <g class="sage" stroke="currentColor" fill="currentColor">
    <line x1="128" y1="44" x2="58" y2="44" stroke-width="1.2" stroke-dasharray="3 3"/>
    <polygon points="55,44 61,41 61,47" stroke="none"/>
    <text x="64" y="54" font-family="ui-monospace, monospace" font-size="7" letter-spacing="0.4" stroke="none">backprompt</text>
  </g>
</svg>
