<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A spectrum between two extremes: 'LLMs plan if prompted right' on the left, 'LLMs are glorified translators' on the right, with LLM-Modulo as the middle position.">
  <style>
    .ink            { color: #1a1810; }
    .muted          { color: #5d553f; }
    .rule-soft      { color: #d4c8a4; }
    .oxblood        { color: #8b1f2c; }
    .blueprint      { color: #1f4f7a; }
    .blueprint-tint { color: rgba(31, 79, 122, 0.08); }
    .oxblood-tint   { color: rgba(139, 31, 44, 0.06); }
    .muted-tint     { color: rgba(93, 85, 63, 0.06); }
    @media (prefers-color-scheme: dark) {
      .ink            { color: #ede2c4; }
      .muted          { color: #a89c7d; }
      .rule-soft      { color: #3a3327; }
      .oxblood        { color: #e09098; }
      .blueprint      { color: #88c0e8; }
      .blueprint-tint { color: rgba(136, 192, 232, 0.10); }
      .oxblood-tint   { color: rgba(224, 144, 152, 0.10); }
      .muted-tint     { color: rgba(168, 156, 125, 0.10); }
    }
  </style>

  <!-- Caption row -->
  <g class="muted" stroke="none" fill="currentColor">
    <text x="280" y="20" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle" letter-spacing="0.12em">TWO CAMPS &#183; ONE MIDDLE</text>
  </g>

  <!-- LEFT: Overoptimism -->
  <g class="oxblood-tint" stroke="none" fill="currentColor">
    <rect x="20" y="40" width="140" height="100" rx="6"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="20" y="40" width="140" height="100" rx="6" stroke-width="1.4" fill="none"/>
    <text x="90" y="60" font-family="Fraunces, serif" font-size="12" font-style="italic" text-anchor="middle" stroke="none">overoptimism</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="90" y="82" font-family="Spectral, serif" font-size="10" text-anchor="middle">&#8220;LLMs plan if you</text>
    <text x="90" y="95" font-family="Spectral, serif" font-size="10" text-anchor="middle">prompt them right.&#8221;</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="90" y="118" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">CoT &#183; ReAct &#183; ToT</text>
    <text x="90" y="131" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">self-critique loops</text>
  </g>

  <!-- MIDDLE: LLM-Modulo -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="190" y="30" width="180" height="120" rx="8"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="190" y="30" width="180" height="120" rx="8" stroke-width="2" fill="none"/>
    <text x="280" y="54" font-family="Fraunces, serif" font-size="14" font-style="italic" text-anchor="middle" stroke="none">LLM-Modulo</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="280" y="78" font-family="Spectral, serif" font-size="10" text-anchor="middle">approximate knowledge</text>
    <text x="280" y="91" font-family="Spectral, serif" font-size="10" text-anchor="middle">source + sound external</text>
    <text x="280" y="104" font-family="Spectral, serif" font-size="10" text-anchor="middle">critics, in tight loop</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="280" y="128" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">Generate &#183; Test &#183; Critique</text>
    <text x="280" y="141" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">(this paper)</text>
  </g>

  <!-- RIGHT: Pessimism -->
  <g class="muted-tint" stroke="none" fill="currentColor">
    <rect x="400" y="40" width="140" height="100" rx="6"/>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <rect x="400" y="40" width="140" height="100" rx="6" stroke-width="1.4" fill="none"/>
    <text x="470" y="60" font-family="Fraunces, serif" font-size="12" font-style="italic" text-anchor="middle" stroke="none">pessimism</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="470" y="82" font-family="Spectral, serif" font-size="10" text-anchor="middle">&#8220;LLMs are glorified</text>
    <text x="470" y="95" font-family="Spectral, serif" font-size="10" text-anchor="middle">syntactic translators.&#8221;</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="470" y="118" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">LLM &#8594; PDDL &#8594; solver</text>
    <text x="470" y="131" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">front-end only</text>
  </g>

  <!-- Spectrum axis beneath -->
  <g class="rule-soft" stroke="currentColor" fill="none">
    <line x1="40" y1="172" x2="520" y2="172" stroke-width="1.2"/>
  </g>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <circle cx="90"  cy="172" r="3" stroke="none"/>
    <circle cx="280" cy="172" r="4" stroke="none"/>
    <circle cx="470" cy="172" r="3" stroke="none"/>
    <line x1="280" y1="150" x2="280" y2="168" stroke-width="1.2"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="40"  y="190" font-family="JetBrains Mono, monospace" font-size="8">ascribe too much</text>
    <text x="280" y="190" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="middle">use them rightly</text>
    <text x="520" y="190" font-family="JetBrains Mono, monospace" font-size="8" text-anchor="end">ascribe too little</text>
  </g>
</svg>
