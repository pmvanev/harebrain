<svg width="186" height="58" viewBox="0 0 186 58" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink       { color: #1a1810; }
    .muted     { color: #5d553f; }
    .rule-soft { color: #d4c8a4; }
    .oxblood   { color: #8b1f2c; }
    .blueprint { color: #1f4f7a; }
    .blueprint-tint { color: rgba(31, 79, 122, 0.07); }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .muted     { color: #a89c7d; }
      .rule-soft { color: #3a3327; }
      .oxblood   { color: #e09098; }
      .blueprint { color: #88c0e8; }
      .blueprint-tint { color: rgba(136, 192, 232, 0.10); }
    }
  </style>
  <!-- chart container -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="2" y="6" width="86" height="46" rx="8" stroke-width="1.4" fill="none"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="8" y="17" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em">STATE</text>
  </g>
  <!-- LLM nucleus -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <ellipse cx="45" cy="32" rx="26" ry="13"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <ellipse cx="45" cy="32" rx="26" ry="13" stroke-width="1.3" fill="none"/>
    <text x="45" y="35" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.12em" stroke="none">LLM</text>
  </g>
  <!-- transition arrow -->
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <line x1="92" y1="29" x2="112" y2="29" stroke-width="1.3"/>
    <polygon points="115,29 109,26 109,32" stroke="none"/>
    <text x="92" y="22" font-family="ui-monospace, monospace" font-size="7.5" letter-spacing="0.4" stroke="none">e[C]/a</text>
  </g>
  <!-- blackboard panel -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="118" y="6" width="66" height="46" rx="3" stroke-width="1.4" fill="none"/>
  </g>
  <g class="rule-soft" stroke="currentColor" fill="none">
    <line x1="118" y1="18" x2="184" y2="18" stroke-width="1"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="124" y="15" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em">BB</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor" font-family="ui-monospace, monospace" font-size="7">
    <text x="123" y="27">enemy = pawn_3</text>
    <text x="123" y="36">conf = 0.82</text>
    <text x="123" y="45">age = 4s</text>
  </g>
</svg>
