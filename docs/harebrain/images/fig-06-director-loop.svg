<svg viewBox="0 0 580 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The director loop: an outer loop sampling the agent's state and emitting interrupts back into the inner loop.">
  <style>
    .muted           { color: #5d553f; }
    .blueprint       { color: #1f4f7a; }
    .blueprint-deep  { color: #143553; }
    .blueprint-tint  { color: rgba(31, 79, 122, 0.07); }
    .oxblood         { color: #8b1f2c; }
    @media (prefers-color-scheme: dark) {
      .muted           { color: #a89c7d; }
      .blueprint       { color: #88c0e8; }
      .blueprint-deep  { color: #bcdcf2; }
      .blueprint-tint  { color: rgba(136, 192, 232, 0.10); }
      .oxblood         { color: #e09098; }
    }
  </style>

  <!-- inner loop ellipse (blueprint-tint fill, blueprint stroke) -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <ellipse cx="290" cy="125" rx="160" ry="70"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <ellipse cx="290" cy="125" rx="160" ry="70" stroke-width="1.4" fill="none"/>
    <text x="290" y="105" font-family="Fraunces, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">inner agent loop</text>
  </g>
  <g class="blueprint-deep" stroke="none" fill="currentColor">
    <text x="290" y="125" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle">read bb &#8594; LLM &#8594; tool &#8594; write bb</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="290" y="145" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">N transitions per state, then guard fires</text>
  </g>

  <!-- outer loop ring -->
  <g class="oxblood" stroke="currentColor" fill="none">
    <ellipse cx="290" cy="125" rx="225" ry="92" stroke-width="1.4" stroke-dasharray="6 4"/>
  </g>

  <!-- sample arrow (down), interrupt arrow (right), director's tools list -->
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <line x1="290" y1="33" x2="290" y2="55" stroke-width="1.4" fill="none"/>
    <polygon points="290,55 287,49 293,49" stroke="none"/>
    <text x="296" y="48" font-family="JetBrains Mono, monospace" font-size="9" stroke="none">sample</text>

    <line x1="510" y1="125" x2="528" y2="125" stroke-width="1.4" fill="none"/>
    <polygon points="528,125 522,122 522,128" stroke="none"/>
    <text x="490" y="115" font-family="JetBrains Mono, monospace" font-size="9" stroke="none">interrupt</text>
  </g>
  <g class="oxblood" stroke="none" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="9">
    <text x="46" y="40">&#183; raise budget penalty</text>
    <text x="46" y="56">&#183; force re-entry</text>
    <text x="46" y="72">&#183; widen tool set</text>
    <text x="46" y="88">&#183; demand evidence</text>
    <text x="46" y="104">&#183; pause &amp; ask user</text>
  </g>

  <!-- footer note -->
  <g class="muted" stroke="none" fill="currentColor">
    <text x="290" y="215" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle" letter-spacing="0.1em">director runs at lower frequency than the inner loop &#183; cheap to leave on</text>
  </g>
</svg>
