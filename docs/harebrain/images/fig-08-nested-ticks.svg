  <!-- Time axis -->
  <g class="muted" stroke="currentColor" fill="currentColor">
    <line x1="140" y1="268" x2="580" y2="268" stroke-width="0.8" fill="none"/>
    <text x="360" y="284" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle" letter-spacing="0.16em" stroke="none">TIME &#8594;</text>
