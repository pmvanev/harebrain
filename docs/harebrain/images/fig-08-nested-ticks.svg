<svg viewBox="0 0 620 295" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nested ticks across four layers. The Policy tick spans the full width; within it sit four Orchestration runs; within each run sit three Agent steps; and within those, dense rows of Model calls.">
  <style>
    .ink             { color: #1a1810; }
    .muted           { color: #5d553f; }
    .blueprint       { color: #1f4f7a; }
    .blueprint-tint  { color: rgba(31, 79, 122, 0.07); }
    .oxblood         { color: #8b1f2c; }
    .oxblood-tint    { color: rgba(139, 31, 44, 0.06); }
    .sage            { color: #4f6b3f; }
    .sage-tint       { color: rgba(79, 107, 63, 0.08); }
    @media (prefers-color-scheme: dark) {
      .ink             { color: #ede2c4; }
      .muted           { color: #a89c7d; }
      .blueprint       { color: #88c0e8; }
      .blueprint-tint  { color: rgba(136, 192, 232, 0.10); }
      .oxblood         { color: #e09098; }
      .oxblood-tint    { color: rgba(224, 144, 152, 0.10); }
      .sage            { color: #b1c98c; }
      .sage-tint       { color: rgba(177, 201, 140, 0.10); }
    }
  </style>

  <!-- Layer labels (italic) -->
  <g class="oxblood" stroke="none" fill="currentColor">
    <text x="20" y="51" font-family="Fraunces, serif" font-size="14" font-style="italic">Policy</text>
  </g>
  <g class="blueprint" stroke="none" fill="currentColor">
    <text x="20" y="111" font-family="Fraunces, serif" font-size="14" font-style="italic">Orchestration</text>
  </g>
  <g class="sage" stroke="none" fill="currentColor">
    <text x="20" y="171" font-family="Fraunces, serif" font-size="14" font-style="italic">Agent</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="20" y="231" font-family="Fraunces, serif" font-size="14" font-style="italic">Model</text>
  </g>

  <!-- Layer sublabels (muted mono) -->
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="9">
    <text x="20" y="65">MPLv2</text>
    <text x="20" y="125">LangGraph</text>
    <text x="20" y="185">LangChain</text>
    <text x="20" y="245">LLM</text>
  </g>

  <!-- Policy: one tick, full width -->
  <g class="oxblood-tint" stroke="none" fill="currentColor">
    <rect x="140" y="34" width="440" height="34" rx="4"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="140" y="34" width="440" height="34" rx="4" stroke-width="1.5" fill="none"/>
    <text x="360" y="55" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" letter-spacing="0.18em" stroke="none">ONE TICK</text>
  </g>

  <!-- Orchestration: 4 runs -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="140" y="94" width="106" height="34" rx="3"/>
    <rect x="250" y="94" width="106" height="34" rx="3"/>
    <rect x="360" y="94" width="106" height="34" rx="3"/>
    <rect x="470" y="94" width="106" height="34" rx="3"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="140" y="94" width="106" height="34" rx="3" stroke-width="1.3" fill="none"/>
    <rect x="250" y="94" width="106" height="34" rx="3" stroke-width="1.3" fill="none"/>
    <rect x="360" y="94" width="106" height="34" rx="3" stroke-width="1.3" fill="none"/>
    <rect x="470" y="94" width="106" height="34" rx="3" stroke-width="1.3" fill="none"/>
    <text x="193" y="115" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" stroke="none">run</text>
    <text x="303" y="115" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" stroke="none">run</text>
    <text x="413" y="115" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" stroke="none">run</text>
    <text x="523" y="115" font-family="JetBrains Mono, monospace" font-size="10" text-anchor="middle" stroke="none">run</text>
  </g>

