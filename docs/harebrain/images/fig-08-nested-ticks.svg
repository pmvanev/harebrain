    <rect x="210" y="154" width="32" height="34" rx="2"/>
    <rect x="250" y="154" width="32" height="34" rx="2"/>
    <rect x="285" y="154" width="32" height="34" rx="2"/>
    <rect x="320" y="154" width="32" height="34" rx="2"/>
    <rect x="360" y="154" width="32" height="34" rx="2"/>
    <rect x="395" y="154" width="32" height="34" rx="2"/>
    <rect x="430" y="154" width="32" height="34" rx="2"/>
    <rect x="470" y="154" width="32" height="34" rx="2"/>
    <rect x="505" y="154" width="32" height="34" rx="2"/>
    <rect x="540" y="154" width="32" height="34" rx="2"/>
  </g>
  <g class="sage" stroke="currentColor" fill="none">
    <rect x="140" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="175" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="210" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="250" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="285" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="320" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="360" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="395" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="430" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="470" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="505" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
    <rect x="540" y="154" width="32" height="34" rx="2" stroke-width="1.1"/>
  </g>

