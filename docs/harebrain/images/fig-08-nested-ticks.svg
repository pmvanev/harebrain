    <line x1="266" y1="214" x2="266" y2="248" stroke-width="1.1"/>
    <line x1="278" y1="214" x2="278" y2="248" stroke-width="1.1"/>
    <line x1="290" y1="214" x2="290" y2="248" stroke-width="1.1"/>
    <line x1="302" y1="214" x2="302" y2="248" stroke-width="1.1"/>
    <line x1="314" y1="214" x2="314" y2="248" stroke-width="1.1"/>
    <line x1="326" y1="214" x2="326" y2="248" stroke-width="1.1"/>
    <line x1="338" y1="214" x2="338" y2="248" stroke-width="1.1"/>
    <line x1="350" y1="214" x2="350" y2="248" stroke-width="1.1"/>
    <line x1="364" y1="214" x2="364" y2="248" stroke-width="1.1"/>
    <line x1="376" y1="214" x2="376" y2="248" stroke-width="1.1"/>
    <line x1="388" y1="214" x2="388" y2="248" stroke-width="1.1"/>
    <line x1="400" y1="214" x2="400" y2="248" stroke-width="1.1"/>
    <line x1="412" y1="214" x2="412" y2="248" stroke-width="1.1"/>
    <line x1="424" y1="214" x2="424" y2="248" stroke-width="1.1"/>
    <line x1="436" y1="214" x2="436" y2="248" stroke-width="1.1"/>
    <line x1="448" y1="214" x2="448" y2="248" stroke-width="1.1"/>
    <line x1="460" y1="214" x2="460" y2="248" stroke-width="1.1"/>
    <line x1="474" y1="214" x2="474" y2="248" stroke-width="1.1"/>
    <line x1="486" y1="214" x2="486" y2="248" stroke-width="1.1"/>
    <line x1="498" y1="214" x2="498" y2="248" stroke-width="1.1"/>
    <line x1="510" y1="214" x2="510" y2="248" stroke-width="1.1"/>
    <line x1="522" y1="214" x2="522" y2="248" stroke-width="1.1"/>
    <line x1="534" y1="214" x2="534" y2="248" stroke-width="1.1"/>
    <line x1="546" y1="214" x2="546" y2="248" stroke-width="1.1"/>
    <line x1="558" y1="214" x2="558" y2="248" stroke-width="1.1"/>
    <line x1="570" y1="214" x2="570" y2="248" stroke-width="1.1"/>
