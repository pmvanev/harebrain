<svg viewBox="0 0 920 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Escalation ladder: four stages of game difficulty arranged left to right, each labeled with which harebrain payoff it isolates. L1 Classic Yob 1973 probes topology and the cage; L2 Wumpus moves when startled probes blackboard and working-memory-fact decay; L3 Partial observability probes prompt construction; L4 Bigger or non-dodecahedron graph probes topology generalization. Arrows step from each stage to the next.">
  <style>
    .ink             { color: #1a1810; }
    .muted           { color: #5d553f; }
    .rule-soft       { color: #d4c8a4; }
    .blueprint       { color: #1f4f7a; }
    .blueprint-tint  { color: rgba(31, 79, 122, 0.07); }
    .oxblood         { color: #8b1f2c; }
    .oxblood-tint    { color: rgba(139, 31, 44, 0.08); }
    @media (prefers-color-scheme: dark) {
      .ink             { color: #ede2c4; }
      .muted           { color: #a89c7d; }
      .rule-soft       { color: #3a3327; }
      .blueprint       { color: #88c0e8; }
      .blueprint-tint  { color: rgba(136, 192, 232, 0.10); }
      .oxblood         { color: #e09098; }
      .oxblood-tint    { color: rgba(224, 144, 152, 0.10); }
    }
  </style>

  <g class="muted" stroke="none" fill="currentColor">
    <text x="20" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em">ESCALATION_LADDER</text>
  </g>

  <!-- Four stages -->
  <!-- L1 Classic Yob: blueprint (cage demo) -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="40" y="80" width="200" height="180" rx="10"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="40" y="80" width="200" height="180" rx="10" stroke-width="1.4" fill="none"/>
    <text x="140" y="108" font-family="Fraunces, Georgia, serif" font-size="15" font-style="italic" text-anchor="middle" stroke="none">L1 &#183; Classic Yob</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" text-anchor="middle">
    <text x="140" y="128">1973 rules, fixed dodecahedron</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5">
    <text x="58" y="170">isolates:</text>
    <text x="58" y="188">&#8226; chart topology</text>
    <text x="58" y="204">&#8226; "no illegal executions"</text>
    <text x="58" y="240" class="muted">expect: C &#8776; D</text>
    <text x="58" y="220" class="muted">(MPL beats E, F structurally)</text>
  </g>

  <!-- L2 Moving wumpus -->
  <g class="oxblood-tint" stroke="none" fill="currentColor">
    <rect x="260" y="80" width="200" height="180" rx="10"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="260" y="80" width="200" height="180" rx="10" stroke-width="1.4" fill="none"/>
    <text x="360" y="108" font-family="Fraunces, Georgia, serif" font-size="15" font-style="italic" text-anchor="middle" stroke="none">L2 &#183; Wumpus moves</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" text-anchor="middle">
    <text x="360" y="128">startled wumpus relocates</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5">
    <text x="278" y="170">isolates:</text>
    <text x="278" y="188">&#8226; blackboard slots</text>
    <text x="278" y="204">&#8226; WMF decay (F.E.A.R.)</text>
    <text x="278" y="220" class="muted">stale-as-fresh failures</text>
    <text x="278" y="240" class="oxblood">expect: D &gt; C measurably</text>
  </g>

  <!-- L3 Partial obs -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="480" y="80" width="200" height="180" rx="10" stroke-width="1.3" fill="none"/>
    <text x="580" y="108" font-family="Fraunces, Georgia, serif" font-size="15" font-style="italic" text-anchor="middle" stroke="none">L3 &#183; Partial obs</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" text-anchor="middle">
    <text x="580" y="128">only senses visible on entry</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5">
    <text x="498" y="170">isolates:</text>
    <text x="498" y="188">&#8226; prompt construction</text>
    <text x="498" y="204">&#8226; explicit uncertainty</text>
    <text x="498" y="220" class="muted">heuristic falls back to defaults</text>
    <text x="498" y="240" class="muted">LLM reasons from descriptions</text>
  </g>

  <!-- L4 Bigger graph -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="700" y="80" width="200" height="180" rx="10" stroke-width="1.3" fill="none"/>
    <text x="800" y="108" font-family="Fraunces, Georgia, serif" font-size="15" font-style="italic" text-anchor="middle" stroke="none">L4 &#183; Bigger graph</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" text-anchor="middle">
    <text x="800" y="128">non-dodecahedron, larger N</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5">
    <text x="718" y="170">isolates:</text>
    <text x="718" y="188">&#8226; topology generalization</text>
    <text x="718" y="204">&#8226; heuristic's baked-in</text>
    <text x="718" y="220">  assumptions break</text>
    <text x="718" y="240" class="muted">LLM reads adjacencies live</text>
  </g>

  <!-- Step arrows -->
  <g class="muted" stroke="currentColor" fill="currentColor" stroke-width="1.3">
    <line x1="242" y1="170" x2="256" y2="170" fill="none"/>
    <polygon points="258,170 252,167 252,173" stroke="none"/>
    <line x1="462" y1="170" x2="476" y2="170" fill="none"/>
    <polygon points="478,170 472,167 472,173" stroke="none"/>
    <line x1="682" y1="170" x2="696" y2="170" fill="none"/>
    <polygon points="698,170 692,167 692,173" stroke="none"/>
  </g>

  <g class="muted" stroke="none" fill="currentColor">
    <text x="40" y="296" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" letter-spacing="0.05em">don't escalate until C falls short &#183; each stage probes a different harebrain.md payoff in isolation</text>
  </g>
</svg>
