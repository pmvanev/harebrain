<svg width="470" height="160" viewBox="0 0 470 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink       { color: #1a1810; }
    .oxblood   { color: #8b1f2c; }
    .muted     { color: #5d553f; }
    @media (prefers-color-scheme: dark) {
      .ink     { color: #ede2c4; }
      .oxblood { color: #e09098; }
      .muted   { color: #a89c7d; }
    }
  </style>
  <!-- LEFT: flat diagram A, B, C with arrows alpha, beta, beta, delta, gamma(P) -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="20"  y="15"  width="46" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="135" y="60"  width="46" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="20"  y="105" width="46" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <text x="40"  y="34"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">A</text>
    <text x="155" y="79"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">B</text>
    <text x="40"  y="124" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">C</text>
    <!-- alpha: A -> B -->
    <path d="M 66 30 Q 105 35 135 65" stroke-width="1.2" fill="none"/>
    <polygon points="135,65 128,62 132,58" stroke="none"/>
    <!-- beta: A -> B -->
    <path d="M 66 38 Q 100 55 135 70" stroke-width="1.2" fill="none"/>
    <polygon points="135,70 128,67 132,63" stroke="none"/>
    <!-- beta: C -> B -->
    <path d="M 66 115 Q 100 95 135 82" stroke-width="1.2" fill="none"/>
    <polygon points="135,82 128,86 132,90" stroke="none"/>
    <!-- delta: C -> B -->
    <path d="M 66 122 Q 110 130 135 90" stroke-width="1.2" fill="none"/>
    <polygon points="135,90 128,93 132,97" stroke="none"/>
    <!-- gamma(P): A -> C -->
    <path d="M 30 43 V 105" stroke-width="1.2" fill="none"/>
    <polygon points="30,105 27,99 33,99" stroke="none"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <text x="105" y="42"  font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B1;</text>
    <text x="100" y="65"  font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B2;</text>
    <text x="100" y="105" font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B2;</text>
    <text x="105" y="135" font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B4;</text>
    <text x="3"   y="78"  font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B3;(P)</text>
  </g>
  <!-- "cluster ->" label -->
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <text x="215" y="78" font-family="ui-monospace, monospace" font-size="10" letter-spacing="0.6" stroke="none">cluster &#x2192;</text>
  </g>
  <!-- RIGHT: clustered diagram, D wraps A and C; offset by 250 -->
  <g class="ink" stroke="currentColor" fill="currentColor" transform="translate(250,0)">
    <rect x="10" y="8" width="90" height="135" rx="10" stroke-width="1.4" fill="none"/>
    <rect x="30" y="28" width="46" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <rect x="30" y="98" width="46" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <text x="48" y="47"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">A</text>
    <text x="48" y="117" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">C</text>
    <rect x="155" y="60" width="46" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <text x="173" y="79" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">B</text>
    <!-- alpha: A -> B -->
    <path d="M 76 38 Q 115 38 155 65" stroke-width="1.2" fill="none"/>
    <polygon points="155,65 148,62 152,58" stroke="none"/>
    <!-- delta: C -> B -->
    <path d="M 76 115 Q 115 115 155 88" stroke-width="1.2" fill="none"/>
    <polygon points="155,88 148,91 152,95" stroke="none"/>
    <!-- gamma(P): A -> C -->
    <path d="M 40 56 V 98" stroke-width="1.2" fill="none"/>
    <polygon points="40,98 37,92 43,92" stroke="none"/>
  </g>
  <!-- beta D->B drawn in oxblood (one arrow stands for two) -->
  <g class="oxblood" stroke="currentColor" fill="currentColor" transform="translate(250,0)">
    <path d="M 100 75 Q 130 70 155 75" stroke-width="1.3" fill="none"/>
    <polygon points="155,75 148,72 152,68" stroke="none"/>
  </g>
  <!-- D label and edge labels (oxblood for greek labels) -->
  <g class="muted" stroke="currentColor" fill="currentColor" transform="translate(250,0)">
    <text x="18" y="20" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em" stroke="none">D</text>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor" transform="translate(250,0)">
    <text x="120" y="42"  font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B1;</text>
    <text x="120" y="68"  font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B2;</text>
    <text x="120" y="125" font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B4;</text>
    <text x="12"  y="80"  font-family="ui-monospace, monospace" font-size="10" stroke="none">&#x3B3;(P)</text>
  </g>
</svg>
