<svg width="320" height="170" viewBox="0 0 320 170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink       { color: #1a1810; }
    .oxblood   { color: #8b1f2c; }
    .muted     { color: #5d553f; }
    .h-circle  { fill: #f3eddc; stroke: #8b1f2c; }
    @media (prefers-color-scheme: dark) {
      .ink      { color: #ede2c4; }
      .oxblood  { color: #e09098; }
      .muted    { color: #a89c7d; }
      .h-circle { fill: #14130c; stroke: #e09098; }
    }
  </style>
  <!-- LEFT: default arrow into D, lands on A. (orig 120x120, offset 0,15) -->
  <g class="ink" stroke="currentColor" fill="currentColor" transform="translate(0,15)">
    <rect x="10" y="20" width="100" height="80" rx="9" stroke-width="1.4" fill="none"/>
    <rect x="38" y="58" width="44" height="28" rx="6" stroke-width="1.4" fill="none"/>
    <text x="56" y="77" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">A</text>
    <circle cx="60" cy="44" r="2.5" stroke="none"/>
    <line x1="60" y1="46" x2="60" y2="56" stroke-width="1.2"/>
    <polygon points="60,58 57,53 63,53" stroke="none"/>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor" transform="translate(0,15)">
    <text x="18" y="34" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em" stroke="none">D</text>
  </g>
  <!-- RIGHT: history (orig 160x160), offset to x=140, y=5 -->
  <g class="ink" stroke="currentColor" fill="currentColor" transform="translate(140,5)">
    <rect x="10" y="18" width="140" height="135" rx="10" stroke-width="1.4" fill="none"/>
    <rect x="40" y="48"  width="50" height="24" rx="5" stroke-width="1.4" fill="none"/>
    <rect x="40" y="110" width="50" height="24" rx="5" stroke-width="1.4" fill="none"/>
    <text x="58" y="65"  font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">off</text>
    <text x="60" y="127" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">on</text>
    <line x1="65" y1="72" x2="65" y2="110" stroke-width="1.2"/>
    <polygon points="65,110 62,104 68,104" stroke="none"/>
    <line x1="60" y1="134" x2="60" y2="72" stroke-width="1.2"/>
    <polygon points="60,72 57,78 63,78" stroke="none"/>
    <!-- arrow into the diagram (from H circle) -->
    <line x1="113" y1="60" x2="90" y2="60" stroke-width="1.2"/>
    <polygon points="90,60 96,57 96,63" stroke="none"/>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor" transform="translate(140,5)">
    <text x="18" y="32" font-family="ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em" stroke="none">alarm1</text>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor" transform="translate(140,5)">
    <text x="68" y="92" font-family="ui-monospace, monospace" font-size="10" stroke="none">d</text>
    <text x="46" y="92" font-family="ui-monospace, monospace" font-size="10" stroke="none">d</text>
    <text x="100" y="55" font-family="ui-monospace, monospace" font-size="10" stroke="none">a</text>
  </g>
  <!-- H circle: paper fill + oxblood stroke, both theme-adaptive via .h-circle class -->
  <g transform="translate(140,5)">
    <circle cx="120" cy="55" r="11" class="h-circle" stroke-width="1.4"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor" transform="translate(140,5)">
    <text x="115" y="59" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" stroke="none">H</text>
    <line x1="120" y1="20" x2="120" y2="44" stroke-width="1.2" stroke-dasharray="3 3"/>
  </g>
</svg>
