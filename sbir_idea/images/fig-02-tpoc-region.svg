<svg viewBox="0 0 460 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TPOC Q&amp;A sibling region: a small three-state chart — Generating, Awaiting, Ingested — running alongside the main proposal pipeline.">
  <style>
    .ink             { color: #1a1810; }
    .muted           { color: #5d553f; }
    .rule-soft       { color: #d4c8a4; }
    .blueprint       { color: #1f4f7a; }
    .blueprint-tint  { color: rgba(31, 79, 122, 0.07); }
    .oxblood         { color: #8b1f2c; }
    @media (prefers-color-scheme: dark) {
      .ink             { color: #ede2c4; }
      .muted           { color: #a89c7d; }
      .rule-soft       { color: #3a3327; }
      .blueprint       { color: #88c0e8; }
      .blueprint-tint  { color: rgba(136, 192, 232, 0.10); }
      .oxblood         { color: #e09098; }
    }
  </style>

  <!-- outer region container (dashed = orthogonal sibling) -->
  <g class="muted" stroke="currentColor" fill="none">
    <rect x="10" y="14" width="440" height="100" rx="10" stroke-width="1.2" stroke-dasharray="5 4"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="22" y="32" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em">TPOC_QA</text>
  </g>

  <!-- default arrow -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <circle cx="36" cy="74" r="2.6" stroke="none"/>
    <line x1="38" y1="74" x2="58" y2="74" stroke-width="1.3" fill="none"/>
    <polygon points="58,74 52,71 52,77" stroke="none"/>
  </g>

  <!-- Generating -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="60" y="56" width="84" height="36" rx="6" stroke-width="1.4" fill="none"/>
    <text x="102" y="79" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">Generating</text>
  </g>

  <!-- Awaiting (blueprint — waits on external answer) -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="180" y="56" width="80" height="36" rx="6"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="180" y="56" width="80" height="36" rx="6" stroke-width="1.4" fill="none"/>
    <text x="220" y="79" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">Awaiting</text>
  </g>

  <!-- Ingested -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="296" y="56" width="76" height="36" rx="6" stroke-width="1.4" fill="none"/>
    <text x="334" y="79" font-family="Fraunces, Georgia, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">Ingested</text>
  </g>

  <!-- arrows between states -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <line x1="144" y1="74" x2="178" y2="74" stroke-width="1.3" fill="none"/>
    <polygon points="180,74 174,71 174,77" stroke="none"/>
    <line x1="260" y1="74" x2="294" y2="74" stroke-width="1.3" fill="none"/>
    <polygon points="296,74 290,71 290,77" stroke="none"/>
    <line x1="372" y1="74" x2="402" y2="74" stroke-width="1.3" fill="none"/>
    <polygon points="404,74 398,71 398,77" stroke="none"/>
  </g>

  <!-- terminal -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <circle cx="412" cy="74" r="5" stroke-width="1.2" fill="none"/>
    <circle cx="412" cy="74" r="2" stroke="none"/>
  </g>

  <!-- transition labels -->
  <g class="oxblood" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="8.5" text-anchor="middle">
    <text x="161" y="68">questions sent</text>
    <text x="278" y="68">answers in</text>
  </g>

  <!-- footer caption -->
  <g class="muted" stroke="none" fill="currentColor">
    <text x="230" y="124" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.1em">orthogonal sibling region · live Wave 1 through Wave 3</text>
  </g>
</svg>
