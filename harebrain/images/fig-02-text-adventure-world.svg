<svg viewBox="0 0 600 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A text-adventure world: four rooms connected by exits, a world-flags blackboard panel, and a parser slot at the bottom highlighted as the LLM seam.">
  <style>
    .paper-edge-2   { color: #e4dbc1; }
    .ink            { color: #1a1810; }
    .muted          { color: #5d553f; }
    .rule-soft      { color: #d4c8a4; }
    .blueprint      { color: #1f4f7a; }
    .blueprint-tint { color: rgba(31, 79, 122, 0.07); }
    .oxblood        { color: #8b1f2c; }
    @media (prefers-color-scheme: dark) {
      .paper-edge-2   { color: #221f15; }
      .ink            { color: #ede2c4; }
      .muted          { color: #a89c7d; }
      .rule-soft      { color: #3a3327; }
      .blueprint      { color: #88c0e8; }
      .blueprint-tint { color: rgba(136, 192, 232, 0.10); }
      .oxblood        { color: #e09098; }
    }
  </style>

  <!-- room graph container -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="20" y="20" width="370" height="210" rx="10" stroke-width="1.5" fill="none"/>
    <text x="34" y="40" font-family="Fraunces, serif" font-size="13" font-style="italic" stroke="none">World graph</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="34" y="54" font-family="JetBrains Mono, monospace" font-size="9">rooms &#183; exits &#183; guards</text>
  </g>

  <!-- rooms -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="60" y="70" width="110" height="44" rx="6" stroke-width="1.4" fill="none"/>
    <text x="115" y="96" font-family="Spectral, serif" font-size="12" text-anchor="middle" stroke="none">Cellar</text>

    <rect x="240" y="70" width="110" height="44" rx="6" stroke-width="1.4" fill="none"/>
    <text x="295" y="96" font-family="Spectral, serif" font-size="12" text-anchor="middle" stroke="none">Forest</text>

    <rect x="60" y="160" width="110" height="44" rx="6" stroke-width="1.4" fill="none"/>
    <text x="115" y="186" font-family="Spectral, serif" font-size="12" text-anchor="middle" stroke="none">Cave</text>

    <rect x="240" y="160" width="110" height="44" rx="6" stroke-width="1.4" fill="none"/>
    <text x="295" y="186" font-family="Spectral, serif" font-size="12" text-anchor="middle" stroke="none">Maze</text>

    <!-- edges -->
    <line x1="170" y1="92" x2="240" y2="92" stroke-width="1.2" fill="none"/>
    <line x1="115" y1="114" x2="115" y2="160" stroke-width="1.2" fill="none"/>
    <line x1="295" y1="114" x2="295" y2="160" stroke-width="1.2" fill="none"/>
    <line x1="170" y1="182" x2="240" y2="182" stroke-width="1.2" fill="none"/>
  </g>

  <!-- edge labels -->
  <g class="muted" stroke="none" fill="currentColor">
    <text x="205" y="86" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">north</text>
  </g>
  <g class="oxblood" stroke="none" fill="currentColor">
    <text x="205" y="176" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">[lamp_lit]</text>
  </g>

  <!-- world flags panel -->
  <g class="paper-edge-2" stroke="none" fill="currentColor">
    <rect x="408" y="20" width="172" height="210" rx="6"/>
  </g>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="408" y="20" width="172" height="210" rx="6" stroke-width="1.5" fill="none"/>
    <text x="494" y="40" font-family="Fraunces, serif" font-size="13" font-style="italic" text-anchor="middle" stroke="none">World flags</text>
  </g>
  <g class="rule-soft" stroke="currentColor" fill="none">
    <line x1="418" y1="50" x2="570" y2="50"/>
  </g>
  <g class="blueprint" stroke="none" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="10">
    <text x="420" y="70">lamp_lit</text>
    <text x="420" y="90">troll</text>
    <text x="420" y="110">egg.loc</text>
    <text x="420" y="130">held</text>
    <text x="420" y="150">score</text>
    <text x="420" y="170">moves</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor" font-family="JetBrains Mono, monospace" font-size="10">
    <text x="568" y="70" text-anchor="end">true</text>
    <text x="568" y="90" text-anchor="end">dead</text>
    <text x="568" y="110" text-anchor="end">nest</text>
    <text x="568" y="130" text-anchor="end">[lamp, sword]</text>
    <text x="568" y="150" text-anchor="end">42</text>
    <text x="568" y="170" text-anchor="end">87</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="494" y="210" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="middle">typed &#183; keyed &#183; persistent</text>
  </g>

  <!-- parser slot (the leaf) at bottom, highlighted -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="20" y="248" width="560" height="50" rx="6"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="20" y="248" width="560" height="50" rx="6" stroke-width="1.7" fill="none"/>
    <text x="34" y="269" font-family="Fraunces, serif" font-size="13" font-style="italic" stroke="none">Parser &#8212; the leaf</text>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="34" y="287" font-family="JetBrains Mono, monospace" font-size="10">&gt; LIGHT LAMP &#160;&#8594;&#160; verb=light, obj=lamp &#160;&#8594;&#160; set lamp_lit := true</text>
  </g>
  <g class="oxblood" stroke="none" fill="currentColor">
    <text x="566" y="269" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="end" letter-spacing="0.14em">LLM SEAM</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="566" y="287" font-family="JetBrains Mono, monospace" font-size="9" text-anchor="end">(was: ~100-word table)</text>
  </g>
</svg>
