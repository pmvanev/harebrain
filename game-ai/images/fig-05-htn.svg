<svg viewBox="0 0 520 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HTN task decomposition tree: AttackEnemy expands into a sequence which expands into primitives.">
  <style>
    .ink           { color: #1a1810; }
    .muted         { color: #5d553f; }
    .blueprint     { color: #1f4f7a; }
    .blueprint-deep{ color: #163d5f; }
    .sage          { color: #4f6b3f; }
    .tint-paper    { fill: #e4dbc1; }
    .tint-blueprint{ fill: rgba(31, 79, 122, 0.07); }
    @media (prefers-color-scheme: dark) {
      .ink           { color: #ede2c4; }
      .muted         { color: #a89c7d; }
      .blueprint     { color: #88c0e8; }
      .blueprint-deep{ color: #a5d2f0; }
      .sage          { color: #b1c98c; }
      .tint-paper    { fill: #221f15; }
      .tint-blueprint{ fill: rgba(136, 192, 232, 0.10); }
    }
  </style>
  <defs>
    <marker id="arr-ink" class="ink" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="currentColor" stroke="none"/>
    </marker>
  </defs>
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="210" y="10" width="120" height="32" rx="4" stroke-width="1.4" class="tint-paper"/>
    <text x="270" y="31" font-family="Spectral, serif" font-size="13" text-anchor="middle" font-style="italic" stroke="none">AttackEnemy</text>
    <g stroke-width="1.2" fill="none">
      <line x1="200" y1="94" x2="80" y2="130" marker-end="url(#arr-ink)"/>
      <line x1="270" y1="94" x2="270" y2="130" marker-end="url(#arr-ink)"/>
      <line x1="340" y1="94" x2="460" y2="130" marker-end="url(#arr-ink)"/>
    </g>
    <g stroke-width="1.4" class="tint-paper">
      <rect x="20" y="135" width="120" height="32" rx="4"/>
      <rect x="210" y="135" width="120" height="32" rx="4"/>
      <rect x="400" y="135" width="120" height="32" rx="4"/>
    </g>
    <g font-family="Spectral, serif" font-size="12" text-anchor="middle" font-style="italic" stroke="none">
      <text x="80" y="156">TakeCover</text>
      <text x="270" y="156">Aim</text>
      <text x="460" y="156">Fire</text>
    </g>
  </g>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <text x="270" y="4" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle" stroke="none">COMPOUND TASK</text>
    <g stroke-width="1.1" stroke-dasharray="3 3" fill="none">
      <line x1="270" y1="42" x2="270" y2="65"/>
      <line x1="80" y1="167" x2="80" y2="190"/>
    </g>
    <text x="280" y="58" font-family="ui-monospace, monospace" font-size="9" font-style="italic" stroke="none">method: has_cover &amp;&amp; has_ammo</text>
    <g font-family="ui-monospace, monospace" font-size="8" letter-spacing="0.1em" stroke="none">
      <text x="10" y="244">PRIMITIVE</text>
      <text x="85" y="244">PRIMITIVE</text>
      <text x="210" y="216">PRIMITIVE</text>
      <text x="400" y="216">PRIMITIVE</text>
    </g>
  </g>
  <g class="sage" stroke="currentColor" fill="currentColor">
    <rect x="170" y="68" width="200" height="26" rx="13" stroke-width="1.3" fill-opacity="0.08"/>
    <text x="270" y="86" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle" stroke="none">METHOD &#8594; sequence</text>
  </g>
  <g class="ink" stroke="currentColor" fill="none">
    <g stroke-width="1.2" class="tint-blueprint">
      <rect x="10" y="195" width="65" height="28" rx="14"/>
      <rect x="85" y="195" width="65" height="28" rx="14"/>
      <rect x="210" y="170" width="120" height="28" rx="14"/>
      <rect x="400" y="170" width="120" height="28" rx="14"/>
    </g>
  </g>
  <g class="blueprint-deep" stroke="currentColor" fill="currentColor">
    <g font-family="Spectral, serif" font-size="11" text-anchor="middle" stroke="none">
      <text x="42" y="214">MoveTo</text>
      <text x="117" y="214">Crouch</text>
      <text x="270" y="188">aim_at(target)</text>
      <text x="460" y="188">shoot()</text>
    </g>
  </g>
</svg>
