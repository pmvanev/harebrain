<svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Three normalized response curves combined into action utility scores.">
  <style>
    .ink       { color: #1a1810; }
    .muted     { color: #5d553f; }
    .rule      { color: #a99a76; }
    .blueprint { color: #1f4f7a; }
    .oxblood   { color: #8b1f2c; }
    .sage      { color: #4f6b3f; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .muted     { color: #a89c7d; }
      .rule      { color: #5a5037; }
      .blueprint { color: #88c0e8; }
      .oxblood   { color: #e09098; }
      .sage      { color: #b1c98c; }
    }
  </style>
  <g class="muted" stroke="currentColor" fill="currentColor">
    <g font-family="ui-monospace, monospace" font-size="9" letter-spacing="0.12em" stroke="none">
      <text x="20" y="14">FLEE U(health)</text>
      <text x="180" y="14">ATTACK U(distance)</text>
      <text x="375" y="14">RELOAD U(ammo)</text>
    </g>
    <g font-family="ui-monospace, monospace" font-size="8" stroke="none">
      <text x="20" y="113">low</text>
      <text x="125" y="113">high</text>
      <text x="180" y="113">close</text>
      <text x="280" y="113">far</text>
      <text x="375" y="113">empty</text>
      <text x="475" y="113">full</text>
    </g>
    <text x="260" y="142" font-family="ui-monospace, monospace" font-size="10" text-anchor="middle" stroke="none">multiply &#8594; per-action score &#8594; pick highest</text>
    <text x="120" y="174" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" stroke="none">0.21</text>
    <text x="360" y="166" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" stroke="none">0.42</text>
  </g>
  <g class="rule" stroke="currentColor" fill="none">
    <g stroke-width="1">
      <line x1="20" y1="100" x2="140" y2="100"/>
      <line x1="20" y1="25" x2="20" y2="100"/>
      <line x1="180" y1="100" x2="300" y2="100"/>
      <line x1="180" y1="25" x2="180" y2="100"/>
      <line x1="375" y1="100" x2="495" y2="100"/>
      <line x1="375" y1="25" x2="375" y2="100"/>
    </g>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <path d="M 20 35 Q 60 35 80 65 Q 95 95 140 95" stroke-width="2" fill="none"/>
    <rect x="100" y="180" width="40" height="20" stroke-width="1.2" fill-opacity="0.08"/>
    <text x="120" y="194" font-family="Spectral, serif" font-size="10" text-anchor="middle" stroke="none">Flee</text>
  </g>
  <g class="sage" stroke="currentColor" fill="currentColor">
    <path d="M 180 95 Q 215 35 240 35 Q 265 35 300 95" stroke-width="2" fill="none"/>
    <rect x="220" y="160" width="40" height="40" stroke-width="1.6" fill-opacity="0.1"/>
    <text x="240" y="184" font-family="Spectral, serif" font-size="10" text-anchor="middle" stroke="none">Attack</text>
    <text x="240" y="154" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" stroke="none">0.74 &#8592; pick</text>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <path d="M 375 35 Q 395 35 415 65 Q 440 95 495 95" stroke-width="2" fill="none"/>
    <rect x="340" y="172" width="40" height="28" stroke-width="1.2" fill-opacity="0.1"/>
    <text x="360" y="190" font-family="Spectral, serif" font-size="10" text-anchor="middle" stroke="none">Reload</text>
  </g>
  <g class="ink" stroke="currentColor" fill="none">
    <g stroke-width="1.2">
      <line x1="60" y1="160" x2="60" y2="200"/>
      <line x1="60" y1="200" x2="460" y2="200"/>
    </g>
  </g>
</svg>
