<svg viewBox="0 0 960 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two architectures side by side. Left panel labeled 'LangChain / LangGraph (runs E, F)': an LLM agent is told the rules of Hunt the Wumpus and narrates the session in its own context, claiming room transitions, sensed adjacencies, kills, and inventory; an MPL Hunt the Wumpus simulation runs silently in parallel as ground truth; per-turn a comparator diffs the agent's claimed state against MPL's actual state and emits divergence events. Right panel labeled 'harebrain (run D)': MPL Hunt the Wumpus IS the world—a single chart owns rooms, vars, hazards, transitions—with a decide leaf that calls the LLM as a host import to return per-turn verdicts (move direction, shoot path) that the chart routes on; the blackboard holds typed sensed-room slots with decay, used to construct the LLM's prompt. The caption notes: no oracle needed for harebrain because the chart owns truth.">
  <style>
    .ink             { color: #1a1810; }
    .muted           { color: #5d553f; }
    .rule-soft       { color: #d4c8a4; }
    .blueprint       { color: #1f4f7a; }
    .blueprint-deep  { color: #143553; }
    .blueprint-tint  { color: rgba(31, 79, 122, 0.07); }
    .oxblood         { color: #8b1f2c; }
    .oxblood-tint    { color: rgba(139, 31, 44, 0.08); }
    @media (prefers-color-scheme: dark) {
      .ink             { color: #ede2c4; }
      .muted           { color: #a89c7d; }
      .rule-soft       { color: #3a3327; }
      .blueprint       { color: #88c0e8; }
      .blueprint-deep  { color: #bcdcf2; }
      .blueprint-tint  { color: rgba(136, 192, 232, 0.10); }
      .oxblood         { color: #e09098; }
      .oxblood-tint    { color: rgba(224, 144, 152, 0.10); }
    }
  </style>

  <g class="muted" stroke="none" fill="currentColor">
    <text x="20" y="24" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9.5" letter-spacing="0.1em">TWO_ARCHITECTURES</text>
  </g>

  <!-- ===== LEFT: trusted-narrator + MPL oracle ===== -->
  <g class="muted" stroke="currentColor" fill="none">
    <rect x="40" y="50" width="430" height="410" rx="12" stroke-width="1.2" stroke-dasharray="6 5"/>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="60" y="78" font-family="Fraunces, Georgia, serif" font-size="16" font-style="italic">LangChain / LangGraph &#183; runs E, F</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="60" y="96" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">trusted narrator &#183; MPL as silent oracle</text>
  </g>

  <!-- agent box -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="64" y="116" width="382" height="86" rx="8" stroke-width="1.3" fill="none"/>
    <text x="82" y="142" font-family="Fraunces, Georgia, serif" font-size="14" font-style="italic" stroke="none">LLM agent</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="82" y="162">told the rules + initial board &#183; narrates the session</text>
    <text x="82" y="178">claims: room, senses, kills, inventory, arrows</text>
    <text x="82" y="194">owns the world model in its own context</text>
  </g>

  <!-- arrow down: claims -->
  <g class="ink" stroke="currentColor" fill="currentColor" stroke-width="1.2">
    <line x1="255" y1="202" x2="255" y2="236" fill="none"/>
    <polygon points="255,238 252,232 258,232" stroke="none"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="266" y="224">per-turn claimed state</text>
  </g>

  <!-- oracle box -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="64" y="240" width="382" height="86" rx="8"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="64" y="240" width="382" height="86" rx="8" stroke-width="1.4" fill="none"/>
    <text x="82" y="266" font-family="Fraunces, Georgia, serif" font-size="14" font-style="italic" stroke="none">MPL Hunt the Wumpus &#183; oracle</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="82" y="286">same seed &#183; replays the agent's moves silently</text>
    <text x="82" y="302">ground-truth room, hazards, alive/dead, arrows</text>
    <text x="82" y="318">ledger captures every transition</text>
  </g>

  <!-- diff arrow -->
  <g class="oxblood" stroke="currentColor" fill="currentColor" stroke-width="1.3">
    <line x1="255" y1="326" x2="255" y2="358" fill="none"/>
    <polygon points="255,360 252,354 258,354" stroke="none"/>
  </g>
  <g class="oxblood" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="266" y="346">diff</text>
  </g>

  <!-- divergence box -->
  <g class="oxblood-tint" stroke="none" fill="currentColor">
    <rect x="64" y="362" width="382" height="76" rx="8"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="64" y="362" width="382" height="76" rx="8" stroke-width="1.5" fill="none"/>
    <text x="82" y="388" font-family="Fraunces, Georgia, serif" font-size="14" font-style="italic" stroke="none">divergence events</text>
  </g>
  <g class="oxblood" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="82" y="408">turn 14: agent says wumpus dead; oracle says alive</text>
    <text x="82" y="424">turn 22: agent claims 2 arrows; oracle says 1</text>
  </g>

  <!-- ===== RIGHT: embedded LLM in MPL ===== -->
  <g class="oxblood" stroke="currentColor" fill="none">
    <rect x="490" y="50" width="430" height="410" rx="12" stroke-width="1.4"/>
  </g>
  <g class="ink" stroke="none" fill="currentColor">
    <text x="510" y="78" font-family="Fraunces, Georgia, serif" font-size="16" font-style="italic">harebrain &#183; run D</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="510" y="96" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">LLM embedded at decision leaves &#183; chart owns truth</text>
  </g>

  <!-- big chart box -->
  <g class="blueprint-tint" stroke="none" fill="currentColor">
    <rect x="514" y="116" width="382" height="324" rx="10"/>
  </g>
  <g class="blueprint" stroke="currentColor" fill="currentColor">
    <rect x="514" y="116" width="382" height="324" rx="10" stroke-width="1.5" fill="none"/>
    <text x="705" y="142" font-family="Fraunces, Georgia, serif" font-size="14" font-style="italic" text-anchor="middle" stroke="none">MPL Hunt the Wumpus (chart)</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" text-anchor="middle">
    <text x="705" y="158">rooms &#183; transitions &#183; hazards &#183; arrows</text>
  </g>

  <!-- blackboard panel -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="538" y="184" width="334" height="76" rx="6" stroke-width="1.2" fill="none"/>
    <text x="555" y="206" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" stroke="none">blackboard (typed slots, w/ decay)</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="555" y="224">current_room: 12      arrows: 3</text>
    <text x="555" y="240">smell_seen_at: {5: 0.9, 7: 0.6}</text>
    <text x="555" y="254">visited: [12, 4, 12, 3]</text>
  </g>

  <!-- decide leaf (LLM host import) -->
  <g class="oxblood-tint" stroke="none" fill="currentColor">
    <rect x="538" y="276" width="334" height="72" rx="6"/>
  </g>
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <rect x="538" y="276" width="334" height="72" rx="6" stroke-width="1.4" fill="none"/>
    <text x="555" y="298" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" stroke="none">decide(state) -&gt; verdict   // host import</text>
  </g>
  <g class="oxblood" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="555" y="316">prompt built from blackboard slots</text>
    <text x="555" y="332">verdict: "move_to_3" | "shoot_path([3,7,5])" | ...</text>
  </g>

  <!-- routing rules row -->
  <g class="ink" stroke="currentColor" fill="currentColor">
    <rect x="538" y="364" width="334" height="58" rx="6" stroke-width="1.2" fill="none"/>
    <text x="555" y="386" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" stroke="none">rules route on verdict</text>
  </g>
  <g class="muted" stroke="none" fill="currentColor" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">
    <text x="555" y="402">Room12 when v == "move_to_3" =&gt; Room3</text>
    <text x="555" y="416">(invalid verdicts don't match any rule)</text>
  </g>

  <!-- footer captions -->
  <g class="muted" stroke="none" fill="currentColor">
    <text x="60" y="456" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">oracle external &#183; agent can claim anything</text>
    <text x="510" y="456" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9">chart owns truth &#183; LLM cannot claim anything</text>
  </g>
</svg>
