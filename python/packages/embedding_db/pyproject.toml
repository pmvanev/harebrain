[project]
name = "embedding_db"
version = "0.0.0"
description = "Learning exercise: PDF -> chunks -> embeddings -> vector store -> semantic search."
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pypdf>=4.0",
    "sentence-transformers>=2.7",
    "chromadb>=0.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/embedding_db"]
