[project]
name = "wumpus"
version = "0.0.0"
description = "Faithful Yob 1973 Hunt the Wumpus engine; substrate for the harebrain experiment matrix."
requires-python = ">=3.11"
dependencies = [
    # R2-S01: JsonlSink validates every emitted event against
    # `wumpus/schemas/v<SCHEMA_VERSION>.json` at emit time. The library is the
    # standard choice (pure Python; tracks JSON Schema draft 2020-12).
    "jsonschema>=4",
]

[project.scripts]
wumpus = "wumpus.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/wumpus"]

[tool.coverage.run]
source = ["src/wumpus"]
branch = true
omit = [
  "*/tests/*",
  "*/__main__.py",
  "*/host_import.py",
]

[tool.coverage.report]
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
]
precision = 1
show_missing = true
skip_empty = true

# Mutation testing config lives at
# docs/feature/wumpus/deliver/mutation/cosmic-ray.toml (cosmic-ray, not mutmut —
# see CLAUDE.md § Mutation Testing Strategy). The previous [tool.mutmut] block
# was removed 2026-05-28: mutmut 3.x has no native Windows support and a
# breaking config-schema rewrite incompatible with this project's pre-existing
# mutmut 2.x-style config; cosmic-ray is the Windows-native alternative.
