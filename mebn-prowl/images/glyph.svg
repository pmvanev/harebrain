<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ink       { color: #1a1810; }
    .paper     { color: #f3eddc; }
    .oxblood   { color: #8b1f2c; }
    .muted     { color: #5d553f; }
    .blueprint { color: #1f4f7a; }
    @media (prefers-color-scheme: dark) {
      .ink       { color: #ede2c4; }
      .paper     { color: #14130c; }
      .oxblood   { color: #e09098; }
      .muted     { color: #a89c7d; }
      .blueprint { color: #88c0e8; }
    }
  </style>
  <!-- left: small Bayesian network (3 nodes, 3 edges) -->
  <g class="ink" stroke="currentColor" stroke-width="1.3">
    <circle cx="20" cy="14" r="8" class="paper" fill="currentColor"/>
    <circle cx="50" cy="14" r="8" class="paper" fill="currentColor"/>
    <circle cx="35" cy="46" r="8" class="paper" fill="currentColor"/>
  </g>
  <g class="ink" stroke="currentColor" fill="none" stroke-width="1">
    <line x1="22" y1="22" x2="32" y2="38"/>
    <line x1="48" y1="22" x2="38" y2="38"/>
    <line x1="28" y1="14" x2="42" y2="14"/>
  </g>
  <!-- middle: bridge label -->
  <g class="oxblood" stroke="currentColor" fill="currentColor">
    <text x="100" y="22" font-family="ui-monospace, monospace" font-size="9" text-anchor="middle" letter-spacing="0.16em" stroke="none">MEBN</text>
    <line x1="78" y1="32" x2="122" y2="32" stroke-width="1.2"/>
  </g>
  <g class="muted" stroke="none" fill="currentColor">
    <text x="100" y="46" font-family="ui-monospace, monospace" font-size="8" text-anchor="middle" letter-spacing="0.12em">PR-OWL</text>
  </g>
  <!-- right: nested OWL-like classes -->
  <g class="blueprint" stroke="currentColor" fill="none" stroke-width="1.3">
    <rect x="140" y="6" width="55" height="48" rx="4"/>
    <rect x="148" y="14" width="40" height="32" rx="3"/>
    <rect x="156" y="22" width="25" height="16" rx="2"/>
  </g>
  <g class="blueprint" fill="currentColor" stroke="none">
    <text x="167" y="34" font-family="serif" font-size="9" text-anchor="middle" font-style="italic">owl</text>
  </g>
</svg>
